        body {

            padding: 20px; margin: 0;

        }
        body.bg-court {
            --bg-color: #0a0003; --text-color: #ff88aa; --accent-color: #ff0055;
            --border-color: #4a001a; --neon-shadow: 0 0 20px rgba(255, 0, 85, 0.4); --grid-color: rgba(255, 0, 85, 0.05);
        }
        body.bg-ending {
            --bg-color: #1a1500; --text-color: #ffdd44; --accent-color: #ffcc00;

        body.alarm-active { animation: alarmPulse 1s infinite alternate; }

        /* === 狀態與導航 UI === */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }

        .potion-box { color: var(--success-color); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: help; font-size: 14px; }
        .location-badge { color: var(--accent-color); font-weight: bold; font-size: 14px; text-shadow: 0 0 5px var(--accent-color); }

        .subtitle { text-align: center; color: var(--sub-text); margin-bottom: 25px; font-size: 13px; letter-spacing: 1px; }
        
        .story-box { background: rgba(13, 17, 23, 0.9); border-left: 4px solid var(--accent-color); padding: 15px 20px; margin-bottom: 20px; border-radius: 0 8px 8px 0; font-size: 15px; line-height: 1.7; color: #e6edf3; }

        /* 導航門 */

        .sort-text { flex-grow: 1; padding-right: 15px; font-size: 14px; line-height: 1.5; color: #e6edf3; }
        .sort-btns { display: flex; gap: 8px; }
        .sort-btn { background: #30363d; color: var(--accent-color); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; box-sizing: border-box; resize: none; font-size: 15px; line-height: 1.6; }

        button.potion-btn { border-color: var(--success-color); color: var(--success-color); margin-bottom: 15px; display: none; }

        .hidden { display: none !important; }

        /* 結局動畫 */

        .final-key { position: absolute; font-size: 90px; opacity: 0; animation: revealKey 2s 3s forwards; text-shadow: 0 0 40px #ffcc00; }

// 音效引擎
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx, ambientInterval, bgMusicObj = null;

function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playTone(freq, type, duration, vol) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playClick() { playTone(800, 'sine', 0.1, 0.03); }
function playSuccess() { playTone(400, 'sine', 0.1, 0.08); setTimeout(() => playTone(600, 'sine', 0.15, 0.08), 100); setTimeout(() => playTone(800, 'sine', 0.3, 0.08), 250); }
function playError() { playTone(250, 'triangle', 0.2, 0.05); setTimeout(() => playTone(200, 'triangle', 0.4, 0.05), 200); }
function playWarp() { playTone(300, 'sine', 0.5, 0.05); setTimeout(() => playTone(450, 'sine', 0.8, 0.05), 200); }
function playFootsteps() {
    if(!audioCtx) return; let time = audioCtx.currentTime;
    for(let i=0; i<3; i++) {
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(80, time); osc.frequency.exponentialRampToValueAtTime(30, time + 0.2);
        gain.gain.setValueAtTime(0.15, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.2); time += 0.6;
    }
}
function playTypingSound() {
    if(!audioCtx) return; let time = audioCtx.currentTime;
    for(let i=0; i<8; i++) {
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(1000 + Math.random()*500, time);
        gain.gain.setValueAtTime(0.02, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.03); time += Math.random() * 0.1 + 0.05;
    }
}
function startIntermittentAmbient() {
    if (ambientInterval) clearInterval(ambientInterval);
    ambientInterval = setInterval(() => {
        if (!audioCtx) return; let rand = Math.random();
        if (rand < 0.2) { playTone(1500 + Math.random()*500, 'sine', 0.05, 0.01); setTimeout(() => playTone(1500 + Math.random()*500, 'sine', 0.05, 0.01), 150); } 
        else if (rand < 0.4) { playTone(250, 'sine', 0.5, 0.02); }
    }, 12000); 
}

// 核心渲染引擎
function renderRoom(roomId) {
    currentRoom = roomId;
    const room = rooms[roomId];
    document.getElementById('game-content').innerHTML = "";
    document.getElementById('current-location').innerText = `📍 目前位置：【${room.name}】`;
    
    if (room.isCourt) { document.body.className = "bg-court"; } else { document.body.className = ""; }
    
    // 如果房間已通關，直接顯示導航
    if (room.cleared && room.type !== "end") {
        renderNavigation(roomId);
        return;
    }

    let html = "";
    if (room.type === "flavor") {
        playFootsteps();
        html = `
            <div class="story-box" style="border-color:#ffcc00; color:#ffcc00;">【探索紀錄】</div>
            <div class="story-text">${room.story}</div>
            <button class="action-btn" onclick="clearRoom('${roomId}')">探索完畢，返回導航</button>
        `;
    } 
    else if (room.type === "author") {
        playFootsteps();
        currentAuthorLine = 0;
        html = `
            <div class="story-box" style="border-color:#00f0ff;">【讀取隱藏資料庫】</div>
            <div class="story-text" id="author-text-container"></div>
            <button id="author-next-btn" class="action-btn" onclick="showNextAuthorLine()">讀取下一段資料</button>
            <button id="author-leave-btn" class="action-btn hidden" style="border-color:var(--success-color); color:var(--success-color);" onclick="clearRoom('${roomId}')">資料讀取完畢，返回導航</button>
        `;
    }
    else if (room.type === "npc") {
        playTypingSound();
        let trap = trapDatabase[Math.floor(Math.random() * trapDatabase.length)];
        let opts = [...trap.options]; shuffleArray(opts);
        html = `
            <div class="story-box" style="border-color:#ff0055; color:#ffbbcc;">【遭遇前人解謎者】</div>
            <div class="story-text">${room.story}</div>
            <div class="quiz-card" style="border-color: #ff0055;">
                <div class="type-badge" style="color: #ffcc00; border-color: #ffcc00; background: rgba(255,204,0,0.15);">⚡ 解謎交易 (只有一次機會)</div>
                <div class="question-text">${trap.q}</div>
                <div id="npc-opts">
                    <label class="option-item" onclick="playClick()"><input type="radio" name="npc-choice" value="${opts[0].c}"><span>${opts[0].t}</span></label>
                    <label class="option-item" onclick="playClick()"><input type="radio" name="npc-choice" value="${opts[1].c}"><span>${opts[1].t}</span></label>
                </div>
                <button id="npc-btn" class="action-btn" style="border-color: #ff0055; color: #ff0055;" onclick="submitNpc('${roomId}')">回答並索取藥水</button>
                <div id="npc-msg" class="message"></div>
                <button id="npc-leave-btn" class="action-btn hidden" onclick="clearRoom('${roomId}')">離開此地</button>
            </div>
        `;
    }
    else if (room.type === "password") {
        playTypingSound();
        html = `
            <h2 style="color:var(--item-color); text-align:center;">【密碼閘門】</h2>
            <div class="story-text" style="border-color:var(--item-color); text-align:center;">${room.story}</div>
            <div class="quiz-card" style="text-align:center;">
                <input type="text" id="pwd-input" class="text-input" placeholder="輸入解鎖代碼..." style="width:60%; margin-bottom:20px;">
                <button class="action-btn" onclick="checkPassword('${roomId}')">驗證密碼</button>
                <div id="pwd-msg" class="message"></div>
            </div>
        `;
    }
    else if (room.type === "combine") {
        activeCombineSlot = null; combineSelected = [null, null];
        html = `
            <h2 style="color:#ff0055; text-align:center;">【跨域密碼鎖】</h2>
            <div class="story-text" style="border-color:#ff0055; text-align:center; white-space:pre-wrap;">${room.story}</div>
            <div class="combine-container">
                <div class="combine-slot" id="slot-1" onclick="selectCombineSlot(1)"><span style="font-size:16px;">點擊選定<br>凹槽 1</span></div>
                <div style="font-size:30px; color:#ff0055; align-self:center;">+</div>
                <div class="combine-slot" id="slot-2" onclick="selectCombineSlot(2)"><span style="font-size:16px;">點擊選定<br>凹槽 2</span></div>
            </div>
            <button class="action-btn" style="border-color:#ff0055; color:#ff0055; margin-top:20px;" onclick="attemptCombine('${roomId}')">啟動量子融合</button>
            <div id="combine-msg" class="message"></div>
        `;
    }
    else if (room.type === "quiz") {
        currentUsedPotion = false; playTypingSound();
        html = `
            <div class="story-box">【系統紀錄檔 #${room.qIdx}】<br>${room.story}</div>
            <div class="quiz-card">
                <div class="question-text">${room.q}</div>
                ${(room.hint && potions > 0) ? `<button id="potion-btn" class="action-btn potion-btn" style="display:block;" onclick="usePotion('${roomId}')">💊 消耗藥水獲取名師提示</button>` : ''}
                <div id="hint-box" class="message msg-hint hidden"></div>
                <div id="interactive-area"></div>
                <div id="word-count-div" class="word-count hidden" style="text-align: right; font-size: 12px; color: var(--sub-text); margin-top: 5px;">字數：0</div>
                <button class="action-btn" onclick="submitQuiz('${roomId}')">發射解鎖脈衝</button>
                <div id="msg-box" class="message"></div>
            </div>
        `;
    }
    else if (room.type === "end") {
        showEnding(); return;
    }

    document.getElementById('game-content').innerHTML = html;

    // 渲染 Quiz 的選項
    if (room.type === "quiz") {
        const area = document.getElementById('interactive-area');
        if (room.qType === "single") {
            room.opts.forEach(opt => { area.innerHTML += `<label class="option-item" onclick="playClick()"><input type="radio" name="q-choice" value="${opt.id}"><span>${opt.text}</span></label>`; });
        } else if (room.qType === "multi") {
            room.opts.forEach(opt => { area.innerHTML += `<label class="option-item" onclick="playClick()"><input type="checkbox" name="q-choice" value="${opt.id}"><span>${opt.text}</span></label>`; });
        } else if (room.qType === "sort") {
            currentSortOrder = [...room.opts]; shuffleArray(currentSortOrder);
            renderSortList();
        } else {
            document.getElementById('word-count-div').classList.remove('hidden');
            area.innerHTML = `<textarea id="short-answer" placeholder="▶️ 注入論點..." oninput="document.getElementById('word-count-div').innerText = '字數：'+this.value.length;" onclick="playClick()"></textarea>`;
        }
    }
}

// 導航畫面
function renderNavigation(roomId) {
    const room = rooms[roomId];
    let doorsHtml = "";
    for (let [dir, targetId] of Object.entries(room.exits)) {
        let targetRoom = rooms[targetId];
        let status = targetRoom.cleared ? " (已探索)" : " (未知的區域)";
        let color = targetRoom.cleared ? "#8b949e" : "#fff";
        let displayDir = dirMap[dir];
        doorsHtml += `
            <div class="door-card" onclick="renderRoom('${targetId}')">
                <div class="door-dir">🚪 ${displayDir}</div>
                <div class="door-name" style="color:${color};">${targetRoom.cleared ? targetRoom.name : "未知的區域"}</div>
            </div>
        `;
    }
    document.getElementById('game-content').innerHTML = `
        <h2 style="text-align:center; color:var(--accent-color);">🗺️ 區域探索導航</h2>
        <div class="doors-container">${doorsHtml}</div>
    `;
}

function clearRoom(roomId) {
    rooms[roomId].cleared = true;
    playSuccess();
    renderNavigation(roomId);
}

// === 各房間解謎邏輯 ===
function showNextAuthorLine() {
    playClick();
    const container = document.getElementById('author-text-container');
    if (currentAuthorLine < authorLines.length) {
        container.innerHTML += `<div>${authorLines[currentAuthorLine]}</div>`;
        currentAuthorLine++;
    }
    if (currentAuthorLine >= authorLines.length) {
        document.getElementById('author-next-btn').classList.add('hidden');
        document.getElementById('author-leave-btn').classList.remove('hidden');
    }
}

function submitNpc(roomId) {
    const selected = document.querySelector('input[name="npc-choice"]:checked');
    if (!selected) { playError(); showMsg('npc-msg', "⚠️ 必須做出選擇！", false); return; }
    
    document.getElementById('npc-btn').classList.add('hidden');
    document.getElementById('npc-opts').style.pointerEvents = 'none';
    document.getElementById('npc-opts').style.opacity = '0.5';
    document.getElementById('npc-leave-btn').classList.remove('hidden');

    if (selected.value === "true") {
        potions++; updateInventoryUI();
        showMsg('npc-msg', "🟢 答對了！獲得【🧪 藥水 x 1】", true);
        uploadData(studentId, `NPC遭遇戰`, "成功", "獲得藥水");
    } else {
        showMsg('npc-msg', "❌ 答錯了！對方失望地帶著藥水逃走了...", false);
        uploadData(studentId, `NPC遭遇戰`, "失敗", "錯失藥水");
    }
    rooms[roomId].cleared = true;
}

function checkPassword(roomId) {
    const val = document.getElementById('pwd-input').value.trim();
    if (val === rooms[roomId].pwd) {
        showMsg('pwd-msg', "🟢 密碼正確！通道已解鎖。", true);
        setTimeout(() => { clearRoom(roomId); }, 1500);
    } else {
        showMsg('pwd-msg', "❌ 密碼錯誤！", false); playError();
    }
}

function usePotion(roomId) {
    if (potions > 0 && !currentUsedPotion) {
        playSuccess(); potions--; currentUsedPotion = true; updateInventoryUI();
        document.getElementById('potion-btn').style.display = 'none';
        const hintBox = document.getElementById('hint-box');
        hintBox.innerText = rooms[roomId].hint; hintBox.classList.remove('hidden');
    }
}

function submitQuiz(roomId) {
    const room = rooms[roomId]; let isCorrect = false; let ansStr = "";

    if (room.qType === "single") {
        const selected = document.querySelector('input[name="q-choice"]:checked');
        if (!selected) { playError(); showMsg('msg-box', "⚠️ 未選取選項！", false); return; }
        ansStr = selected.value; isCorrect = (ansStr === room.ans);
    } else if (room.qType === "multi") {
        const checkedBoxes = document.querySelectorAll('input[name="q-choice"]:checked');
        const ansArray = Array.from(checkedBoxes).map(cb => cb.value); ansStr = ansArray.join(",");
        isCorrect = ansArray.length === room.ans.length && ansArray.every(val => room.ans.includes(val));
    } else if (room.qType === "sort") {
        const ids = currentSortOrder.map(i => i.id); ansStr = ids.join("➔");
        isCorrect = ids.every((val, i) => val === room.ans[i]);
    } else {
        const field = document.getElementById('short-answer'); ansStr = field ? field.value.trim() : "";
        if (ansStr.length < room.minW) { playError(); showMsg('msg-box', `⚠️ 深度不足（需 ${room.minW} 字）！`, false); return; }
        if (room.keywords) { isCorrect = room.keywords.some(k => ansStr.includes(k)); } else { isCorrect = true; }
    }

    let statusLog = currentUsedPotion ? "成功過關(已用藥水)" : "成功過關";
    let failLog = currentUsedPotion ? "嘗試失敗(已用藥水)" : "嘗試失敗";

    if (isCorrect) {
        showMsg('msg-box', "🟢 【破解成功】取得授權，存取區域獎勵...", true);
        uploadData(studentId, `第${room.qIdx}題`, ansStr, statusLog);
        
        // 給予道具
        if(!itemCollection.includes(room.item)) itemCollection.push(room.item);
        if(room.givesPotion) { potions++; }
        updateInventoryUI();
        
        setTimeout(() => { showItemScreen(roomId); }, 1500);
    } else {
        showMsg('msg-box', "❌ 【破解失敗】邏輯不符！", false); uploadData(studentId, `第${room.qIdx}題`, ansStr, failLog);
    }
}

function showItemScreen(roomId) {
    const room = rooms[roomId]; playSuccess();
    const itemInfo = itemDB[room.item];
    
    let html = `
        <div class="item-box" style="margin: 0 auto;">
            <div class="item-icon">${room.item}</div>
            <div class="item-title">解鎖道具：【${itemInfo.title}】</div>
            <div class="item-desc">${itemInfo.desc}</div>
        </div>
    `;
    if(room.givesPotion) {
        html += `<div style="color:var(--success-color); font-weight:bold; text-align:center; margin-top:20px; font-size:16px;">🎉 系統額外補給：獲得【🧪 藥水 x 1】</div>`;
    }
    html += `<button class="action-btn" style="margin-top:30px;" onclick="clearRoom('${roomId}')">收下道具，返回導航</button>`;
    
    document.getElementById('game-content').innerHTML = html;
}

// === 排序與雜項 ===
function renderSortList() {
    const area = document.getElementById('interactive-area'); area.innerHTML = "";
    currentSortOrder.forEach((item, index) => {
        area.innerHTML += `<div class="sort-item"><div class="sort-text">${item.text}</div><div class="sort-btns"><button class="sort-btn" onclick="playClick(); moveItem(${index}, -1)">▲</button><button class="sort-btn" onclick="playClick(); moveItem(${index}, 1)">▼</button></div></div>`;
    });
}
function moveItem(index, dir) {
    const target = index + dir; if (target < 0 || target >= currentSortOrder.length) return;
    [currentSortOrder[index], currentSortOrder[target]] = [currentSortOrder[target], currentSortOrder[index]]; renderSortList();
}
function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

function showMsg(boxId, text, isSuccess) {
    const box = document.getElementById(boxId); box.innerText = text; box.className = isSuccess ? "message msg-success" : "message msg-error";
    if (isSuccess) { playSuccess(); document.body.classList.remove('alarm-active'); } else { playError(); document.body.classList.add('alarm-active'); }
}
function hideMsg(boxId) { const b=document.getElementById(boxId); if(b) b.className = "message hidden"; document.body.classList.remove('alarm-active'); }

// === 組合系統 ===
function selectCombineSlot(slotNum) {
    playClick(); activeCombineSlot = slotNum;
    document.getElementById('slot-1').classList.remove('active-slot');
    document.getElementById('slot-2').classList.remove('active-slot');
    document.getElementById('slot-' + slotNum).classList.add('active-slot');
    hideMsg('combine-msg');
}
function attemptCombine(roomId) {
    let room = rooms[roomId]; let target = room.target; 
    if (combineSelected[0] && combineSelected[1] && target.includes(combineSelected[0]) && target.includes(combineSelected[1])) {
        playSuccess();
        showMsg('combine-msg', `🟢 融合成功！生成【${room.resName}】，大門強制開啟！`, true);
        if(!itemCollection.includes(room.resIcon)) { itemCollection.push(room.resIcon); updateInventoryUI(); }
        setTimeout(() => { clearRoom(roomId); }, 2000);
    } else {
        playError(); showMsg('combine-msg', "❌ 融合失敗！物質粒子波段不符，請重新選擇。", false);
        combineSelected = [null, null];
        document.getElementById('slot-1').innerHTML = '<span style="font-size:16px;">點擊選定<br>凹槽 1</span>'; 
        document.getElementById('slot-2').innerHTML = '<span style="font-size:16px;">點擊選定<br>凹槽 2</span>';
        document.getElementById('slot-1').className = "combine-slot"; document.getElementById('slot-2').className = "combine-slot";
    }
}

// === 背包觀察系統 ===
let inspectingItem = "";
function handleInventoryClick(icon) {
    const room = rooms[currentRoom];
    if (room && room.type === 'combine') {
        if (activeCombineSlot) {
            if (combineSelected[0] === icon || combineSelected[1] === icon) { playError(); showMsg('combine-msg', '⚠️ 已放入凹槽！', false); return; }
            playClick(); combineSelected[activeCombineSlot - 1] = icon;
            let slotElem = document.getElementById('slot-' + activeCombineSlot);
            slotElem.innerText = icon; slotElem.classList.remove('active-slot'); slotElem.classList.add('filled');
            activeCombineSlot = null; hideMsg('combine-msg');
        } else {
            playError(); showMsg('combine-msg', '⚠️ 請先點擊下方的融合凹槽，再從上方背包選擇道具！', false);
        }
    } else {
        // 打開觀察模態視窗
        playClick(); inspectingItem = icon;
        let info = itemDB[icon] || { title: "未知晶體", desc: "無法解析的能量聚合體。" };
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-title').innerText = info.title;
        document.getElementById('modal-desc').innerText = info.desc;
        document.getElementById('modal-inspect-text').classList.add('hidden');
        document.getElementById('modal-inspect-btn').classList.remove('hidden');
        document.getElementById('item-modal').classList.remove('hidden');
    }
}
function inspectItem() {
    playSuccess();
    let info = itemDB[inspectingItem];
    document.getElementById('modal-inspect-btn').classList.add('hidden');
    let textDiv = document.getElementById('modal-inspect-text');
    textDiv.innerText = info.inspect || "沒有發現特別之處。";
    textDiv.classList.remove('hidden');
}
function closeItemModal() {
    playClick(); document.getElementById('item-modal').classList.add('hidden');
}

// === 啟動與結局 ===
function startGame() {
    initAudio(); playClick(); startIntermittentAmbient(); 
    if (!bgMusicObj) { bgMusicObj = new Audio("https://dl.dropboxusercontent.com/scl/fi/wsj9d809wijrmemwi4c2m/online-audio-converter.com.mp3?rlkey=b5mtdubtx2wcv08qp764gblsg&st=crdstuwj"); bgMusicObj.loop = true; bgMusicObj.volume = 0.5; }
    bgMusicObj.play().catch(e => console.log(e));

    const inputField = document.getElementById('student-id');
    if (!inputField) return; studentId = inputField.value.trim();
    if (!studentId) { playError(); alert("🚨 識別碼未同步！"); return; }
    
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('status-ui').classList.remove('hidden');
    
    updateInventoryUI();
    renderRoom("r_start"); 
}

function showEnding() {
    if (ambientInterval) clearInterval(ambientInterval);
    document.getElementById('status-ui').classList.add('hidden'); document.getElementById('game-content').innerHTML = "";
    document.body.className = "bg-ending"; document.getElementById('ending-section').classList.remove('hidden');
    playWarp(); setTimeout(playSuccess, 2000);

    const container = document.getElementById('ending-items-container'); container.innerHTML = "";
    itemCollection.forEach((icon, i) => {
        if(i >= 10 || icon === '🧪') return; 
        let el = document.createElement('div'); el.className = 'ending-item'; el.innerText = icon;
        let angle = (i / 10) * Math.PI * 2; let radius = 120;
        el.style.setProperty('--startX', `${Math.cos(angle) * radius}px`); el.style.setProperty('--startY', `${Math.sin(angle) * radius}px`);
        container.appendChild(el);
    });
    let key = document.createElement('div'); key.className = 'final-key'; key.innerText = '🗝️'; container.appendChild(key);
    setTimeout(() => { document.getElementById('ending-final-text').classList.remove('hidden'); playSuccess(); }, 4500);
}

function uploadData(student, stage, answer, status) {
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzKO8cfTapdmmOjeQmH9opY5pnKzVVQ-feUEYZKFbl_ds9HVYmPrg7NlS7H7GnBjz4EWw/exec"; 
    if (webAppUrl !== "") {
        fetch(webAppUrl, {
            method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ student, stage, answer, status, time: new Date().toLocaleString() })
        }).catch(err => console.error(err));
    }
}
