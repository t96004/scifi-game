<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科幻文境：重啟人類覺醒計畫</title>
    <style>
        :root {
            --bg-color: #06090f; --container-bg: rgba(22, 27, 34, 0.85);
            --text-color: #58a6ff; --sub-text: #8b949e;
            --accent-color: #00f0ff; --success-color: #00ff66; --error-color: #ff0055;
            --item-color: #ffcc00; --border-color: #30363d;
            --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.3); --grid-color: rgba(0, 240, 255, 0.03);
        }
        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            font-family: "Courier New", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            padding: 20px; margin: 0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px; transition: all 1s ease;
        }
        body.bg-court {
            --bg-color: #0a0003; --text-color: #ff88aa; --accent-color: #ff0055;
            --border-color: #4a001a; --neon-shadow: 0 0 20px rgba(255, 0, 85, 0.4); --grid-color: rgba(255, 0, 85, 0.05);
        }
        body.bg-ending {
            background: #000000 !important; background-image: none !important;
        }
        
        .container { max-width: 750px; margin: 20px auto; background: var(--container-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--accent-color); box-shadow: var(--neon-shadow); backdrop-filter: blur(10px); position: relative; transition: all 1s ease; }
        
        /* 🚀 獨立大結局專用全螢幕樣式 */
        .container.ending-fullscreen {
            max-width: 100% !important; margin: 0 !important; padding: 0 !important;
            background: transparent !important; border: none !important; box-shadow: none !important;
            backdrop-filter: none !important; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 90vh;
        }

        /* 狀態與背包 UI */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .inventory-items { display: flex; gap: 10px; font-size: 24px; min-height: 30px; align-items: center; }
        .inv-item { cursor: pointer; transition: transform 0.2s; padding: 2px 5px; border-radius: 5px; }
        .inv-item:hover { transform: scale(1.3); background: rgba(255,255,255,0.1); box-shadow: 0 0 10px var(--accent-color); }
        .potion-box { color: var(--success-color); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: help; font-size: 15px; background: rgba(0,255,102,0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid var(--success-color); }
        .location-badge { color: var(--accent-color); font-weight: bold; font-size: 15px; text-shadow: 0 0 5px var(--accent-color); display: flex; align-items: center; gap: 5px;}

        /* 可移動全息地圖 UI */
        .hologram-map { background: rgba(0, 5, 15, 0.8); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-top: 25px; box-shadow: inset 0 0 15px rgba(0,240,255,0.1); }
        .map-title { font-size: 13px; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; text-shadow: 0 0 5px var(--accent-color); text-align: center; }
        .map-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .map-cell { background: #161b22; border: 1px solid #30363d; padding: 10px 5px; border-radius: 6px; text-align: center; font-size: 12px; color: var(--sub-text); cursor: not-allowed; transition: all 0.3s; }
        .map-cell.unlocked { border-color: var(--sub-text); color: #fff; cursor: pointer; background: rgba(255,255,255,0.03); }
        .map-cell.unlocked:hover { border-color: var(--accent-color); background: rgba(0,240,255,0.05); }
        .map-cell.current { border-color: var(--item-color); color: var(--item-color); font-weight: bold; background: rgba(255,204,0,0.1); box-shadow: 0 0 10px rgba(255,204,0,0.2); animation: mapPulse 1.5s infinite alternate; cursor: pointer; }
        @keyframes mapPulse { 0% { border-color: #ffcc00; } 100% { border-color: #fff; } }

        h1 { text-align: center; font-size: 28px; letter-spacing: 3px; text-shadow: 0 0 10px var(--accent-color); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--sub-text); margin-bottom: 25px; font-size: 13px; letter-spacing: 1px; }
        
        .story-box { background: rgba(13, 17, 23, 0.9); border-left: 4px solid var(--accent-color); padding: 15px 20px; margin-bottom: 20px; border-radius: 0 8px 8px 0; font-size: 15px; line-height: 1.7; color: #e6edf3; }
        .story-text { font-size: 1.1em; line-height: 1.8; margin-bottom: 20px; color: #fff; padding: 25px; border: 1px solid var(--accent-color); border-radius: 8px; background: rgba(0,0,0,0.4); text-align: left; white-space: pre-wrap; }
        
        /* 迷宮導航門 */
        .doors-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .door-card { background: #161b22; border: 2px solid var(--border-color); border-radius: 10px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .door-card:hover { border-color: var(--accent-color); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); transform: translateY(-3px); background: rgba(0,240,255,0.05); }
        .door-dir { font-size: 13px; color: var(--sub-text); margin-bottom: 8px; font-weight: bold; }
        .door-name { font-weight: bold; color: #fff; letter-spacing: 1px; font-size: 16px; }
        .door-unknown { color: #8b949e; font-style: italic; }

        /* 模態視窗 (物品觀察) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .item-box { background: #161b22; border: 1px solid var(--item-color); padding: 30px; border-radius: 12px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); position: relative; max-height: 90vh; overflow-y: auto; }
        .item-icon { font-size: 60px; margin-bottom: 15px; text-shadow: 0 0 15px var(--item-color); }
        .item-title { color: var(--item-color); font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .item-desc { color: #fff; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
        .inspect-text { color: var(--accent-color); font-weight: bold; font-size: 15px; line-height: 1.6; margin-top: 15px; padding: 15px; border: 1px dashed var(--accent-color); background: rgba(0,240,255,0.05); border-radius: 8px; white-space: pre-wrap; text-align: left; }

        /* 合成系統 */
        .combine-container { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; }
        .combine-slot { flex: 1; border: 2px dashed var(--sub-text); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; color: var(--sub-text); font-weight: bold; background: rgba(0,0,0,0.3); transition: all 0.3s; font-size: 30px; min-height: 90px; display: flex; align-items: center; justify-content: center; }
        .combine-slot:hover { border-color: var(--item-color); color: var(--item-color); }
        .combine-slot.active-slot { border-color: var(--accent-color); border-style: solid; box-shadow: 0 0 15px var(--accent-color); background: rgba(0,240,255,0.1); color: #fff; transform: scale(1.05); }
        .combine-slot.filled { border-color: var(--success-color); border-style: solid; color: #fff; text-shadow: 0 0 10px #fff; }

        /* 答題區 */
        .quiz-card { background: rgba(33, 38, 45, 0.6); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .type-badge { display: inline-block; padding: 4px 10px; font-size: 12px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; background: rgba(0, 240, 255, 0.15); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .question-text { font-size: 17px; font-weight: bold; line-height: 1.6; margin-bottom: 20px; color: #fff; white-space: pre-wrap; }
        .option-item { background: #161b22; border: 1px solid var(--border-color); padding: 14px 18px; margin-bottom: 12px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option-item:hover { border-color: var(--accent-color); background: rgba(0, 240, 255, 0.05); }
        .option-item input { margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        .sort-item { background: #161b22; border: 1px solid var(--border-color); padding: 12px 18px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .sort-text { flex-grow: 1; padding-right: 15px; font-size: 14px; line-height: 1.5; color: #e6edf3; }
        .sort-btns { display: flex; gap: 8px; }
        .sort-btn { background: #30363d; color: var(--accent-color); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; box-sizing: border-box; resize: none; font-size: 15px; line-height: 1.6; }
        
        button.action-btn { background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 14px 20px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; letter-spacing: 2px; transition: all 0.3s; }
        button.action-btn:hover:not(:disabled) { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-color); }
        button.potion-btn { border-color: var(--success-color); color: var(--success-color); margin-bottom: 15px; display: none; }
        button.potion-btn:hover { background: var(--success-color); color: #000; box-shadow: 0 0 20px var(--success-color); }
