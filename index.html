<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科幻文境：重啟人類覺醒計畫</title>
    <style>
        :root {
            --bg-color: #06090f; --container-bg: rgba(22, 27, 34, 0.85);
            --text-color: #58a6ff; --sub-text: #8b949e;
            --accent-color: #00f0ff; --success-color: #00ff66; --error-color: #ff0055;
            --item-color: #ffcc00; --border-color: #30363d;
            --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.3); --grid-color: rgba(0, 240, 255, 0.03);
        }
        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            font-family: "Courier New", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            padding: 20px; margin: 0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px; transition: all 1s ease;
        }
        body.bg-court {
            --bg-color: #0a0003; --text-color: #ff88aa; --accent-color: #ff0055;
            --border-color: #4a001a; --neon-shadow: 0 0 20px rgba(255, 0, 85, 0.4); --grid-color: rgba(255, 0, 85, 0.05);
        }
        body.bg-ending {
            background: #000000 !important; background-image: none !important;
        }
        
        .container { max-width: 750px; margin: 20px auto; background: var(--container-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--accent-color); box-shadow: var(--neon-shadow); backdrop-filter: blur(10px); position: relative; transition: all 1s ease; }
        
        /* 🚀 獨立大結局專用全螢幕樣式 */
        .container.ending-fullscreen {
            max-width: 100% !important; margin: 0 !important; padding: 0 !important;
            background: transparent !important; border: none !important; box-shadow: none !important;
            backdrop-filter: none !important; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 90vh;
        }

        /* 狀態與背包 UI */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .inventory-items { display: flex; gap: 10px; font-size: 24px; min-height: 30px; align-items: center; }
        .inv-item { cursor: pointer; transition: transform 0.2s; padding: 2px 5px; border-radius: 5px; }
        .inv-item:hover { transform: scale(1.3); background: rgba(255,255,255,0.1); box-shadow: 0 0 10px var(--accent-color); }
        .potion-box { color: var(--success-color); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: help; font-size: 15px; background: rgba(0,255,102,0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid var(--success-color); }
        .location-badge { color: var(--accent-color); font-weight: bold; font-size: 15px; text-shadow: 0 0 5px var(--accent-color); display: flex; align-items: center; gap: 5px;}

        /* 可移動全息地圖 UI */
        .hologram-map { background: rgba(0, 5, 15, 0.8); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-top: 25px; box-shadow: inset 0 0 15px rgba(0,240,255,0.1); }
        .map-title { font-size: 13px; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; text-shadow: 0 0 5px var(--accent-color); text-align: center; }
        .map-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .map-cell { background: #161b22; border: 1px solid #30363d; padding: 10px 5px; border-radius: 6px; text-align: center; font-size: 12px; color: var(--sub-text); cursor: not-allowed; transition: all 0.3s; }
        .map-cell.unlocked { border-color: var(--sub-text); color: #fff; cursor: pointer; background: rgba(255,255,255,0.03); }
        .map-cell.unlocked:hover { border-color: var(--accent-color); background: rgba(0,240,255,0.05); }
        .map-cell.current { border-color: var(--item-color); color: var(--item-color); font-weight: bold; background: rgba(255,204,0,0.1); box-shadow: 0 0 10px rgba(255,204,0,0.2); animation: mapPulse 1.5s infinite alternate; cursor: pointer; }
        @keyframes mapPulse { 0% { border-color: #ffcc00; } 100% { border-color: #fff; } }

        h1 { text-align: center; font-size: 28px; letter-spacing: 3px; text-shadow: 0 0 10px var(--accent-color); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--sub-text); margin-bottom: 25px; font-size: 13px; letter-spacing: 1px; }
        
        .story-box { background: rgba(13, 17, 23, 0.9); border-left: 4px solid var(--accent-color); padding: 15px 20px; margin-bottom: 20px; border-radius: 0 8px 8px 0; font-size: 15px; line-height: 1.7; color: #e6edf3; }
        .story-text { font-size: 1.1em; line-height: 1.8; margin-bottom: 20px; color: #fff; padding: 25px; border: 1px solid var(--accent-color); border-radius: 8px; background: rgba(0,0,0,0.4); text-align: left; white-space: pre-wrap; }
        
        /* 迷宮導航門 */
        .doors-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .door-card { background: #161b22; border: 2px solid var(--border-color); border-radius: 10px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .door-card:hover { border-color: var(--accent-color); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); transform: translateY(-3px); background: rgba(0,240,255,0.05); }
        .door-dir { font-size: 13px; color: var(--sub-text); margin-bottom: 8px; font-weight: bold; }
        .door-name { font-weight: bold; color: #fff; letter-spacing: 1px; font-size: 16px; }
        .door-unknown { color: #8b949e; font-style: italic; }

        /* 模態視窗 (物品觀察) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .item-box { background: #161b22; border: 1px solid var(--item-color); padding: 30px; border-radius: 12px; text-align: center; width: 85%; max-width: 400px; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); position: relative; max-height: 90vh; overflow-y: auto; }
        .item-icon { font-size: 60px; margin-bottom: 15px; text-shadow: 0 0 15px var(--item-color); }
        .item-title { color: var(--item-color); font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .item-desc { color: #fff; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
        .inspect-text { color: var(--accent-color); font-weight: bold; font-size: 15px; line-height: 1.6; margin-top: 15px; padding: 15px; border: 1px dashed var(--accent-color); background: rgba(0,240,255,0.05); border-radius: 8px; white-space: pre-wrap; text-align: left; }

        /* 合成系統 */
        .combine-container { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; }
        .combine-slot { flex: 1; border: 2px dashed var(--sub-text); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; color: var(--sub-text); font-weight: bold; background: rgba(0,0,0,0.3); transition: all 0.3s; font-size: 30px; min-height: 90px; display: flex; align-items: center; justify-content: center; }
        .combine-slot:hover { border-color: var(--item-color); color: var(--item-color); }
        .combine-slot.active-slot { border-color: var(--accent-color); border-style: solid; box-shadow: 0 0 15px var(--accent-color); background: rgba(0,240,255,0.1); color: #fff; transform: scale(1.05); }
        .combine-slot.filled { border-color: var(--success-color); border-style: solid; color: #fff; text-shadow: 0 0 10px #fff; }

        /* 答題區 */
        .quiz-card { background: rgba(33, 38, 45, 0.6); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .type-badge { display: inline-block; padding: 4px 10px; font-size: 12px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; background: rgba(0, 240, 255, 0.15); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .question-text { font-size: 17px; font-weight: bold; line-height: 1.6; margin-bottom: 20px; color: #fff; white-space: pre-wrap; }
        .option-item { background: #161b22; border: 1px solid var(--border-color); padding: 14px 18px; margin-bottom: 12px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option-item:hover { border-color: var(--accent-color); background: rgba(0, 240, 255, 0.05); }
        .option-item input { margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        .sort-item { background: #161b22; border: 1px solid var(--border-color); padding: 12px 18px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .sort-text { flex-grow: 1; padding-right: 15px; font-size: 14px; line-height: 1.5; color: #e6edf3; }
        .sort-btns { display: flex; gap: 8px; }
        .sort-btn { background: #30363d; color: var(--accent-color); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; box-sizing: border-box; resize: none; font-size: 15px; line-height: 1.6; }
        
        button.action-btn { background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); padding: 14px 20px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; letter-spacing: 2px; transition: all 0.3s; }
        button.action-btn:hover:not(:disabled) { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-color); }
        button.potion-btn { border-color: var(--success-color); color: var(--success-color); margin-bottom: 15px; display: none; }
        button.potion-btn:hover { background: var(--success-color); color: #000; box-shadow: 0 0 20px var(--success-color); }
        
        .message { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; font-size: 15px; display: none; white-space: pre-wrap; line-height: 1.6; }
        .msg-success { display: block; background: rgba(0, 255, 102, 0.1); color: var(--success-color); border: 1px solid var(--success-color); text-align: center; }
        .msg-error { display: block; background: rgba(255, 0, 85, 0.1); color: var(--error-color); border: 1px solid var(--error-color); }
        .msg-hint { background: rgba(0, 255, 102, 0.05); color: #fff; border: 1px dashed var(--success-color); padding: 12px; border-radius: 8px; font-weight: normal; margin-bottom: 10px; text-align: left; font-size: 14px; line-height: 1.5; }
        .hidden { display: none !important; }
        input.text-input { width: 100%; padding: 14px; background: #0d1117; color: white; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }

        /* ================= 🚀 史詩級大結局動畫 CSS ================= */
        .ending-items-container { position: relative; height: 400px; width: 100%; max-width: 600px; display: flex; justify-content: center; align-items: center; margin-top: 20px; overflow: hidden; border-radius: 12px; background: #000; box-shadow: inset 0 0 50px rgba(0, 240, 255, 0.1); }
        
        .ending-item { position: absolute; font-size: 35px; opacity: 0; animation: converge 3s forwards; text-shadow: 0 0 10px #fff; }
        @keyframes converge { 0% { transform: translate(var(--startX), var(--startY)) scale(1); opacity: 0; } 20% { opacity: 1; } 80% { transform: translate(0, 0) scale(0.5); opacity: 1; filter: brightness(2); } 100% { transform: translate(0, 0) scale(0); opacity: 0; filter: brightness(3); } }
        
        .door-wrapper { position: absolute; width: 160px; height: 260px; perspective: 1200px; z-index: 10; opacity: 0; animation: revealDoor 1s 3s forwards; }
        .door-frame { position: relative; width: 100%; height: 100%; border: 4px solid var(--accent-color); box-shadow: 0 0 30px var(--accent-color), inset 0 0 20px var(--accent-color); background: #000; }
        .door-panel { position: absolute; top: 0; width: 50%; height: 100%; background: repeating-linear-gradient(90deg, #111, #111 10px, #222 10px, #222 20px); border: 1px solid var(--accent-color); transition: all 3s ease-in-out; transform-style: preserve-3d; }
        .door-left { left: 0; transform-origin: left; animation: openDoorLeft 3s 4.5s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        .door-right { right: 0; transform-origin: right; animation: openDoorRight 3s 4.5s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes revealDoor { 0% { opacity: 0; transform: scale(0.5) translateY(20px); filter: brightness(0); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1.5); } }
        @keyframes openDoorLeft { 100% { transform: rotateY(-130deg); background: rgba(0,0,0,0.8); border-color: transparent; } }
        @keyframes openDoorRight { 100% { transform: rotateY(130deg); background: rgba(0,0,0,0.8); border-color: transparent; } }
        
        .god-light { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 250px; background: #fff; box-shadow: 0 0 40px 20px #fff, 0 0 100px 50px #ffcc00, 0 0 200px 100px #00f0ff; opacity: 0; z-index: 5; animation: explodeLight 5s 5s forwards; }
        @keyframes explodeLight {
            0% { opacity: 0; width: 2px; }
            10% { opacity: 1; width: 20px; box-shadow: 0 0 80px 40px #fff; }
            100% { opacity: 1; width: 2000px; height: 2000px; border-radius: 50%; box-shadow: 0 0 300px 150px #fff, 0 0 600px 400px #ffcc00, 0 0 900px 600px #00f0ff; background: #fff; }
        }

        .flying-dove { position: absolute; font-size: 80px; opacity: 0; z-index: 20; text-shadow: 0 0 30px #fff, 0 0 50px #ffcc00; animation: flyTowardsScreen 4s 5.5s forwards; }
        @keyframes flyTowardsScreen { 0% { opacity: 0; transform: scale(0.1) translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: scale(15) translateY(-30px); } }
        
        .final-text-victory { position: absolute; z-index: 30; opacity: 0; color: #000; text-shadow: 0 0 20px #fff, 0 0 30px #ffcc00; text-align: center; animation: showVictory 2s 7.5s forwards; }
        @keyframes showVictory { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <!-- 頂部狀態列 -->
    <div id="status-ui" class="status-bar hidden">
        <div class="location-badge" id="current-location">📍 系統載入中...</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="inventory-list" class="inventory-items"></div>
            <div class="potion-box" title="消耗藥水可獲取階段性名師提示">🧪 藥水 x<span id="potion-count">0</span></div>
        </div>
    </div>

    <!-- 登入區塊 -->
    <div id="login-section">
        <h1 id="main-title">SYSTEM OVERRIDE</h1>
        <div class="subtitle" id="sub-title">人類意識覺醒協議 // 核心解碼迷宮</div>
        <div class="quiz-card" style="text-align: center;">
            <div class="story-box" style="text-align: left;">
                【系統啟動】... 西元2085年，人類被最高人工智慧「機器法官」囚禁。你必須潛入母體迷宮，解開《科幻小說選》的邏輯悖論。<br><br>
                ⚠️ 警告：迷宮充滿未知分支。請仔細「觀察」取得的道具，尋找密碼線索，並避開喪失心智的前人。
            </div>
            <div class="question-text">請輸入反抗者識別碼（班級座號姓名）：</div>
            <input type="text" id="student-id" class="text-input" placeholder="例如：80523張小明">
            <button type="button" class="action-btn" onclick="startGame()">核心同步 // 潛入迷宮</button>
        </div>
    </div>

    <!-- 動態渲染區塊 -->
    <div id="game-content" class="hidden"></div>

    <!-- 下方動態全息迷宮地圖 -->
    <div id="map-ui" class="hologram-map hidden">
        <div class="map-title">🛰️ 母體全息迷宮儀 (支援歷史節點躍遷探索)</div>
        <div class="map-grid" id="dynamic-map-grid"></div>
    </div>
</div>

<!-- 道具觀察模態視窗 -->
<div id="item-modal" class="modal-overlay hidden">
    <div class="item-box">
        <div style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px; color:#8b949e;" onclick="closeItemModal()">✖</div>
        <div id="modal-icon" class="item-icon"></div>
        <div id="modal-title" class="item-title"></div>
        <div id="modal-desc" class="item-desc"></div>
        <button type="button" id="modal-inspect-btn" class="action-btn" style="margin-top:10px;" onclick="inspectItem()">🔍 深度觀察</button>
        <div id="modal-inspect-text" class="inspect-text hidden"></div>
    </div>
</div>

<script>
// ================= 音效引擎 =================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx, ambientInterval, bgMusicObj = null;

function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playTone(freq, type, duration, vol) {
    if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function playClick() { playTone(800, 'sine', 0.1, 0.03); }
function playSuccess() { playTone(400, 'sine', 0.1, 0.08); setTimeout(() => playTone(600, 'sine', 0.15, 0.08), 100); setTimeout(() => playTone(800, 'sine', 0.3, 0.08), 250); }
function playError() { playTone(250, 'triangle', 0.2, 0.05); setTimeout(() => playTone(200, 'triangle', 0.4, 0.05), 200); }
function playWarp() { playTone(300, 'sine', 0.5, 0.05); setTimeout(() => playTone(450, 'sine', 0.8, 0.05), 200); }
function playFootsteps() {
    if(!audioCtx) return; let time = audioCtx.currentTime;
    for(let i=0; i<3; i++) {
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(80, time); osc.frequency.exponentialRampToValueAtTime(30, time + 0.2);
        gain.gain.setValueAtTime(0.15, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.2); time += 0.6;
    }
}
function playTypingSound() {
    if(!audioCtx) return; let time = audioCtx.currentTime;
    for(let i=0; i<8; i++) {
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(1000 + Math.random()*500, time);
        gain.gain.setValueAtTime(0.02, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.03); time += Math.random() * 0.1 + 0.05;
    }
}
function startIntermittentAmbient() {
    if (ambientInterval) clearInterval(ambientInterval);
    ambientInterval = setInterval(() => {
        if (!audioCtx) return; let rand = Math.random();
        if (rand < 0.2) { playTone(1500 + Math.random()*500, 'sine', 0.05, 0.01); setTimeout(() => playTone(1500 + Math.random()*500, 'sine', 0.05, 0.01), 150); } 
        else if (rand < 0.4) { playTone(250, 'sine', 0.5, 0.02); }
    }, 12000); 
}

function playVictorySequence() {
    if (!audioCtx) return; let time = audioCtx.currentTime;
    let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
    osc1.type = 'triangle'; osc1.frequency.setValueAtTime(100, time + 3); osc1.frequency.exponentialRampToValueAtTime(30, time + 4);
    gain1.gain.setValueAtTime(0, time + 3); gain1.gain.linearRampToValueAtTime(0.5, time + 3.1); gain1.gain.exponentialRampToValueAtTime(0.01, time + 4);
    osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(time + 3); osc1.stop(time + 4);

    let freqs = [440, 554.37, 659.25, 880]; 
    freqs.forEach(f => {
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(f, time + 5);
        gain.gain.setValueAtTime(0, time + 5); gain.gain.linearRampToValueAtTime(0.2, time + 6); gain.gain.exponentialRampToValueAtTime(0.01, time + 10);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time + 5); osc.stop(time + 10);
    });
}

// ================= 道具與題庫 =================
const itemDB = {
    '♟️': { title: "破損的西洋棋子", desc: "初代 AI 的運算邏輯，可干擾母體運算。", inspect: "底部刻著細小的文字：『這不是終點，而是開端。』" },
    '💧': { title: "舊時代的眼淚結晶", desc: "含有高濃度的『悲傷與自卑』赫茲。", inspect: "冰冷的結晶中，倒映著深藍電腦初次戰勝人類的年份數字：\n『1997』" },

function getItemInfo(rawIcon) {
    const cleanStr = (s) => s ? s.replace(/\uFE0F/g, '').trim() : '';
    const target = cleanStr(rawIcon);
    for (let key in itemDB) {
        if (cleanStr(key) === target) return itemDB[key];
    }
    return { title: "未知晶體", desc: "無法解析的能量聚合體。", inspect: "沒有發現特別之處。" };
}

// ================= 全息地圖更新系統 =================
function updateHologramMap() {
    const grid = document.getElementById('dynamic-map-grid');
    if (!grid) return;
    grid.innerHTML = "";

    mapLayoutOrder.forEach(id => {
        if (!rooms[id]) return;
        let cell = document.createElement('div');
        
        if (id === currentRoom) {
            cell.className = "map-cell current";
            cell.innerText = rooms[id].name;
            cell.onclick = () => { playClick(); };
        } else if (visitedNodes.has(id)) {
            cell.className = "map-cell unlocked";
            cell.innerText = rooms[id].name;
            cell.onclick = () => {
                playWarp();
                renderEngine(id);
            };
        } else {
            cell.className = "map-cell";
            cell.innerText = "???";
        }
        grid.appendChild(cell);
    });
}

// === NPC 遞增挑戰引擎 ===
function renderNpcQuestion(roomId) {
    let qData = currentNpcQuestions[currentNpcIndex];
    let opts = [...qData.options]; shuffleArray(opts);
    let html = `
        <div class="question-text">進度 (${currentNpcIndex + 1}/${currentNpcQuestions.length})：${qData.q}</div>
        <div id="npc-opts">
            <label class="option-item" onclick="playClick()"><input type="radio" name="npc-choice" value="${opts[0].c}"><span>${opts[0].t}</span></label>
            <label class="option-item" onclick="playClick()"><input type="radio" name="npc-choice" value="${opts[1].c}"><span>${opts[1].t}</span></label>
        </div>
        <button type="button" id="npc-btn" class="action-btn" style="border-color: #ff0055; color: #ff0055;" onclick="submitNpc('${roomId}')">確認送出</button>
    `;
    document.getElementById('npc-quiz-area').innerHTML = html;
}

function submitNpc(roomId) {
    const selected = document.querySelector('input[name="npc-choice"]:checked');
    if (!selected) { playError(); showMsg('npc-msg', "⚠️ 必須做出選擇！", false); return; }
    
    let qData = currentNpcQuestions[currentNpcIndex];
    let correctAns = qData.options.find(o=>o.c).t;

    if (selected.value === "true") {
        playSuccess(); currentNpcIndex++;
        if (currentNpcIndex < currentNpcQuestions.length) {
            showMsg('npc-msg', `🟢 正確！請準備下一題...`, true);
            setTimeout(() => { hideMsg('npc-msg'); renderNpcQuestion(roomId); }, 1000);
        } else {
            document.getElementById('npc-quiz-area').innerHTML = "";
            potions++; updateInventoryUI(); 
            npcVisits[roomId] = (npcVisits[roomId] || 0) + 1; 
            showMsg('npc-msg', "🎉 全部答對！獲得【🧪 藥水 x 1】", true); 
            document.getElementById('npc-leave-btn').classList.remove('hidden');
            uploadData(studentId, `NPC遭遇戰`, "成功", "獲得藥水");
        }
    } else {
        playError();
        document.getElementById('npc-quiz-area').innerHTML = "";
        showMsg('npc-msg', `❌ 錯誤！正確答案是「${correctAns}」。對方失望地逃走了...`, false); 
        document.getElementById('npc-leave-btn').classList.remove('hidden');
        uploadData(studentId, `NPC遭遇戰`, "失敗", "錯失藥水");
    }
}

    playClick(); let textDiv = document.getElementById('modal-inspect-text');
    let qData = (qNum === 1) ? chessQs[0] : chessQs[1];
    let opts = [...qData.options]; shuffleArray(opts);

    let html = `
        <div style="border-top:1px dashed var(--item-color); padding-top:15px; margin-top:15px;">

}

// 送出邏輯鎖答案
function submitChessQuiz(qNum, correctText) {
    let selected = document.querySelector('input[name="chess-choice"]:checked');
    if (!selected) { playError(); showMsg('chess-quiz-msg', "⚠️ 必須選擇一個波段輸入！", false); return; }

    if (selected.value === "true") {
        playSuccess();
        if (qNum === 1) chessQ1Solved = true;
        if (qNum === 2) chessQ2Solved = true;
        potions++; updateInventoryUI();
        showMsg('chess-quiz-msg', "🟢 邏輯鎖解除！從暗格中掉落了【🧪 藥水 x 1】", true);
        setTimeout(() => { inspectItem(); }, 2000);
    } else {
        playError();
        showMsg('chess-quiz-msg', `❌ 代碼錯誤！正確答案應為「${correctText}」。鎖頭暫時凍結...`, false);
        setTimeout(() => { inspectItem(); }, 2500);
    }
}

// === API 安全通訊防護網 ===
async function uploadData(student, stage, answer, status) {
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxV-dHDhA9klf2KYlrFALxdCX1Id3DfObqG-l-UX0KYNS20ZvBsMVzPJsGn4n8BGcZQGg/exec"; 
    try {
        let response = await fetch(webAppUrl, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ student, stage, answer, status, time: new Date().toLocaleString() })
        });
        return await response.json();
    } catch (err) {
        console.error("後臺資料傳送異常:", err);
        return { success: true, isPass: true, feedback: "連線異常，系統強制放行。" };
    }
}

function checkPassword(roomId) {
    const val = document.getElementById('pwd-input').value.trim(); const room = rooms[roomId];
    if (val === room.pwd) { showMsg('pwd-msg', "🟢 密碼正確！通道已解鎖。", true); setTimeout(() => { renderEngine(room.onUnlock); }, 1500); } 
    else { showMsg('pwd-msg', "❌ 密碼錯誤！", false); playError(); }
}

// 🚀 【三階段消耗式提示系統】
function usePotion(roomId) {
    let room = rooms[roomId];
    if (!room.hints) return;
    let progress = roomHintsProgress[roomId] || 0;

    if (potions > 0 && progress < room.hints.length) {
        playSuccess(); potions--; updateInventoryUI();
        
        let hintBox = document.getElementById('hint-box');
        hintBox.innerHTML += `<div class="msg-hint">${room.hints[progress]}</div>`;
        hintBox.classList.remove('hidden');
        
        roomHintsProgress[roomId] = progress + 1;
        
        if (roomHintsProgress[roomId] >= room.hints.length) {
            document.getElementById('potion-btn').style.display = 'none';
        }
    }
}

async function submitQuiz(roomId) {
    const room = rooms[roomId]; let isCorrect = false; let ansStr = "";
    
    if (room.qType === "single") {
        const selected = document.querySelector('input[name="q-choice"]:checked'); if (!selected) { playError(); showMsg('msg-box', "⚠️ 未選取選項！", false); return; }
        ansStr = selected.value; isCorrect = (ansStr === room.ans);
    } else if (room.type === "multi" || room.qType === "multi") {
        const checkedBoxes = document.querySelectorAll('input[name="q-choice"]:checked'); const ansArray = Array.from(checkedBoxes).map(cb => cb.value); ansStr = ansArray.join(",");
        isCorrect = ansArray.length === room.ans.length && ansArray.every(val => room.ans.includes(val));
    } else if (room.qType === "sort") {
        const ids = currentSortOrder.map(i => i.id); ansStr = ids.join("➔"); isCorrect = ids.every((val, i) => val === room.ans[i]);
    } else {
        const field = document.getElementById('short-answer'); ansStr = field ? field.value.trim() : "";
        if (ansStr.length < room.minW) { playError(); showMsg('msg-box', `⚠️ 深度不足（需寫滿 ${room.minW} 字）！`, false); return; }
        isCorrect = true; 
    }

    if (!isCorrect) {
        playError(); let errMsg = room.qType === "sort" ? "❌ 【破解失敗】歷史時序排列不正確，請重新調整！" : "❌ 【破解失敗】邏輯不符！";
        showMsg('msg-box', errMsg, false); 
        
        let progress = roomHintsProgress[roomId] || 0;
        if (room.hints && potions > 0 && progress < room.hints.length) {
            document.getElementById('potion-btn').style.display = 'block';
        }
        uploadData(studentId, `第${room.qIdx}題`, ansStr, "嘗試失敗"); 
        return;
    }

    const buttons = document.querySelectorAll('#game-content .quiz-card .action-btn');
    const submitBtn = buttons[buttons.length - 1];

    if (room.qIdx === 2 || room.qIdx === 11) {
        if(submitBtn) { submitBtn.innerText = "📡 系統連線中... 母體邏輯判定中..."; submitBtn.disabled = true; submitBtn.style.opacity = "0.5"; }
        let result = await uploadData(studentId, `第${room.qIdx}題`, ansStr, "等待AI審核");
        if(submitBtn) { submitBtn.innerText = "發射解鎖脈衝"; submitBtn.disabled = false; submitBtn.style.opacity = "1"; }

        if (result && result.isPass === false) {
            playError(); showMsg('msg-box', "❌ 【母體駁回】\n" + result.feedback, false);
            let progress = roomHintsProgress[roomId] || 0;
            if (room.hints && potions > 0 && progress < room.hints.length) {
                document.getElementById('potion-btn').style.display = 'block';
            }
            return; 
        }
    } else {
        uploadData(studentId, `第${room.qIdx}題`, ansStr, "成功過關"); 
    }

    showMsg('msg-box', "🟢 【破解成功】取得授權，存取區域獎勵...", true);
    if(!itemCollection.includes(room.rewardItem)) itemCollection.push(room.rewardItem);
    if(room.givesPotion) { potions++; } updateInventoryUI(); 
    setTimeout(() => { showItemReward(roomId); }, 1500);
}

function showItemReward(roomId) {
    const room = rooms[roomId]; playSuccess(); const itemInfo = getItemInfo(room.rewardItem);
    let html = `<div class="item-box" style="margin: 0 auto;"><div class="item-icon">${room.rewardItem}</div><div class="item-title">解鎖道具：【${itemInfo.title}】</div><div class="item-desc">${itemInfo.desc}</div></div>`;
    if(room.givesPotion) { html += `<div style="color:var(--success-color); font-weight:bold; text-align:center; margin-top:20px; font-size:16px;">🎉 系統額外補給：獲得【🧪 藥水 x 1】</div>`; }
    html += `<button type="button" class="action-btn" style="margin-top:30px;" onclick="renderEngine('${room.onClear}')">收下道具，繼續探索</button>`;
    document.getElementById('game-content').innerHTML = html;
}

// === 背包與融合機制 ===
function handleInventoryClick(idx) {
    const rawIcon = itemCollection[idx]; const room = rooms[currentRoom];
    const cleanStr = (s) => s ? s.replace(/\uFE0F/g, '').trim() : '';

    if (room && room.type === 'lock') {
        if (cleanStr(rawIcon) === cleanStr(room.reqItem)) {
            playSuccess(); showMsg('lock-msg', '🟢 物質波段吻合，大門強制開啟！', true);
            setTimeout(() => { renderEngine(room.onUnlock); }, 1500);
        } else {
            playError(); showMsg('lock-msg', '❌ 物質波段不符，大門毫無反應。', false);
            openInspectModal(rawIcon);
        }
    }
    else if (room && room.type === 'combine') {
        if (activeCombineSlot) {
            if (cleanStr(combineSelected[0]) === cleanStr(rawIcon) || cleanStr(combineSelected[1]) === cleanStr(rawIcon)) { 
                playError(); showMsg('combine-msg', '⚠️ 這個道具已經放入凹槽了！', false); return; 
            }
            playClick(); combineSelected[activeCombineSlot - 1] = rawIcon; 
            let slotElem = document.getElementById('slot-' + activeCombineSlot);
            slotElem.innerText = rawIcon; slotElem.classList.remove('active-slot'); slotElem.classList.add('filled'); 
            activeCombineSlot = null; hideMsg('combine-msg');
        } else { openInspectModal(rawIcon); }
    } else { openInspectModal(rawIcon); }
}

function openInspectModal(icon) {
    inspectingItem = icon; const info = getItemInfo(icon);
    document.getElementById('modal-icon').innerText = icon;
    document.getElementById('modal-title').innerText = info.title;
    document.getElementById('modal-desc').innerText = info.desc;
    document.getElementById('modal-inspect-text').classList.add('hidden');
    document.getElementById('modal-inspect-btn').classList.remove('hidden');
    document.getElementById('item-modal').classList.remove('hidden');
}

function closeItemModal() { playClick(); document.getElementById('item-modal').classList.add('hidden'); }
function selectCombineSlot(slotNum) { playClick(); activeCombineSlot = slotNum; document.getElementById('slot-1').classList.remove('active-slot'); document.getElementById('slot-2').classList.remove('active-slot'); document.getElementById('slot-' + slotNum).classList.add('active-slot'); hideMsg('combine-msg'); }

function attemptCombine(roomId) {
    let room = rooms[roomId]; const cleanStr = (s) => s ? s.replace(/\uFE0F/g, '').trim() : '';
    let target = room.target.map(cleanStr); let c0 = cleanStr(combineSelected[0]); let c1 = cleanStr(combineSelected[1]);

    if (c0 && c1 && target.includes(c0) && target.includes(c1)) {
        playSuccess(); showMsg('combine-msg', `🟢 融合成功！生成【${room.resName}】，大門強制開啟！`, true);
        if(!itemCollection.includes(room.resIcon)) { itemCollection.push(room.resIcon); updateInventoryUI(); } 
        setTimeout(() => { renderEngine(room.onUnlock); }, 2000);
    } else {
        playError(); showMsg('combine-msg', "❌ 融合失敗！物質粒子波段不符，請重新選擇。", false); combineSelected = [null, null];
        document.getElementById('slot-1').innerHTML = '<span style="font-size:16px;">點擊選定<br>凹槽 1</span>'; document.getElementById('slot-2').innerHTML = '<span style="font-size:16px;">點擊選定<br>凹槽 2</span>';
        document.getElementById('slot-1').className = "combine-slot"; document.getElementById('slot-2').className = "combine-slot";
    }
}

// === 工具模組 ===
function updateInventoryUI() { let html = ''; itemCollection.forEach((icon, i) => { html += `<span class="inv-item" title="點擊" onclick="handleInventoryClick(${i})">${icon}</span>`; }); document.getElementById('inventory-list').innerHTML = html; document.getElementById('potion-count').innerText = potions; }
function renderSortList() { const area = document.getElementById('interactive-area'); area.innerHTML = ""; currentSortOrder.forEach((item, index) => { area.innerHTML += `<div class="sort-item"><div class="sort-text">${item.text}</div><div class="sort-btns"><button type="button" class="sort-btn" onclick="playClick(); moveItem(${index}, -1)">▲</button><button type="button" class="sort-btn" onclick="playClick(); moveItem(${index}, 1)">▼</button></div></div>`; }); }
function moveItem(index, dir) { const target = index + dir; if (target < 0 || target >= currentSortOrder.length) return; [currentSortOrder[index], currentSortOrder[target]] = [currentSortOrder[target], currentSortOrder[index]]; renderSortList(); }
function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
function updateWordCount(t) { document.getElementById('word-count-div').innerText = `字數計測：${t.value.length}`; }
function showMsg(boxId, text, isSuccess) { const box = document.getElementById(boxId); if(box){ box.innerText = text; box.className = isSuccess ? "message msg-success" : "message msg-error"; } if (isSuccess) { playSuccess(); document.body.classList.remove('alarm-active'); } else { playError(); document.body.classList.add('alarm-active'); } }
function hideMsg(boxId) { const b=document.getElementById(boxId); if(b) b.className = "message hidden"; document.body.classList.remove('alarm-active'); }

function startGame() {
    initAudio(); playClick(); startIntermittentAmbient(); 
    if (!bgMusicObj) { bgMusicObj = new Audio("https://dl.dropboxusercontent.com/scl/fi/wsj9d809wijrmemwi4c2m/online-audio-converter.com.mp3?rlkey=b5mtdubtx2wcv08qp764gblsg&st=crdstuwj"); bgMusicObj.loop = true; bgMusicObj.volume = 0.5; }
    bgMusicObj.play().catch(e => console.log(e));
    const inputField = document.getElementById('student-id'); if (!inputField) return; studentId = inputField.value.trim();
    if (!studentId) { playError(); alert("🚨 識別碼未同步！"); return; }
    document.getElementById('login-section').classList.add('hidden'); document.getElementById('status-ui').classList.remove('hidden'); document.getElementById('map-ui').classList.remove('hidden');
    updateInventoryUI(); renderEngine("r_start"); 
}
